name: linter

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Generate App Key
        run: php artisan key:generate

      - name: Setup Database
        run: |
          touch database/database.sqlite
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Scan and Enable Extensions
        run: |
          php artisan extensions:scan
          php artisan extensions:sync
          php artisan extensions:enable projects
          php artisan extensions:enable tasks
          php artisan extensions:enable forms
          php artisan extensions:enable spaces
          php artisan extensions:enable default

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate

      - name: Run Pint
        run: composer run lint:check

      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint

      - name: TypeScript Check
        run: npm run types:check
