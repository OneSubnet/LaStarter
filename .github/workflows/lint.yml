name: linter

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Verify Environment
        run: cat .env | head -5 && echo "---" && php -r "require 'vendor/autoload.php'; echo 'autoload ok';"

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Debug bootstrap
        run: php -r "require 'vendor/autoload.php'; echo 'bound env: ' . var_export(class_exists('Illuminate\Foundation\Application'), true);"

      - name: Generate App Key
        run: php artisan key:generate -vvv
        env:
          APP_ENV: local
          APP_DEBUG: "true"

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate

      - name: Run Pint
        run: composer run lint:check

      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint

      - name: TypeScript Check
        run: npm run types:check
