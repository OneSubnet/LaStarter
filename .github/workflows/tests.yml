name: tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.5']
        database: ['sqlite', 'pgsql']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lastarter
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: lastarter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug
          extensions: pdo_sqlite, pdo_pgsql

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Install Node Dependencies
        run: npm ci

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Configure Database (SQLite)
        if: matrix.database == 'sqlite'
        run: |
          touch database/database.sqlite
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env

      - name: Configure Database (PostgreSQL)
        if: matrix.database == 'pgsql'
        run: |
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=3306/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=lastarter_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=lastarter/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Scan and Enable Extensions
        run: |
          php artisan extensions:scan
          php artisan extensions:sync
          php artisan extensions:enable ailes-invisibles
          php artisan extensions:enable projects
          php artisan extensions:enable tasks
          php artisan extensions:enable forms
          php artisan extensions:enable spaces
          php artisan extensions:enable default

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate

      - name: Build Assets
        run: npm run build

      - name: TypeScript Check
        run: npm run types:check

      - name: Run Tests
        run: ./vendor/bin/pest
